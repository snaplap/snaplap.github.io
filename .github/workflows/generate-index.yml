name: Generate Posts Index

on:
  push:
    branches: [main]
    paths:
      - 'posts/**.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate posts/index.json
        run: python scripts/generate_index.py

      - name: Commit updated index
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add posts/index.json
          if git diff --cached --quiet; then
            echo "posts/index.json is already up-to-date"
          else
            git commit -m "chore: update posts index [skip ci]"
            git push
          fi
